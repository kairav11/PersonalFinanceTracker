name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH }}
      DBT_PROFILES_DIR: wealth_flow_dbt
      DBT_TARGET: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dbt
        run: pip install dbt-databricks==1.11.7

      - name: Install dbt packages
        run: dbt deps --project-dir wealth_flow_dbt

      - name: dbt compile
        run: dbt compile --project-dir wealth_flow_dbt

      - name: dbt test Silver
        run: dbt test --select silver --project-dir wealth_flow_dbt --fail-fast
