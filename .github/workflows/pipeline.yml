name: Full Pipeline

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pipeline:
    runs-on: ubuntu-latest

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_TRANSACTIONS_TAB: Transactions
      GOOGLE_BUDGETS_TAB: Budgets
      DBT_PROFILES_DIR: wealth_flow_dbt
      DBT_TARGET: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install ingestion dependencies
        run: pip install -r ingestion/requirements.txt

      - name: Install dbt
        run: pip install dbt-databricks==1.11.7

      - name: Install dbt packages
        run: dbt deps --project-dir wealth_flow_dbt

      - name: Ingest from Google Sheets
        run: python ingestion/ingest_bronze.py

      - name: dbt seed
        run: dbt seed --project-dir wealth_flow_dbt

      - name: dbt run Silver
        run: dbt run --select silver --project-dir wealth_flow_dbt

      - name: dbt test Silver
        run: dbt test --select silver --project-dir wealth_flow_dbt --fail-fast

      - name: dbt run Gold
        run: dbt run --select gold --project-dir wealth_flow_dbt
